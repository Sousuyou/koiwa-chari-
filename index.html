<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>小岩チャリ走 〜終電からにげきれ〜</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #1a1a1a;
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    overflow: hidden;
    touch-action: manipulation;
  }
  #wrap {
    position: relative; width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    display: block;
    background: #fff;
    max-width: 100%;
    max-height: 100%;
    box-shadow: 0 0 0 2px #111, 0 10px 40px rgba(0,0,0,0.5);
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="900" height="506"></canvas></div>
<script>
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

const W = 900, H = 506;
const BASE_Y   = 400;
const PLAYER_X = 160;
const STEP     = 16;
const GRAVITY  = 0.85;
const JUMP_POWER = -14;
const MAX_JUMPS  = 3;

// ===== localStorage =====
function loadBest() { try { return Number(localStorage.getItem('koiwaBest5') || 0) || 0; } catch(e) { return 0; } }
function saveBest(v){ try { localStorage.setItem('koiwaBest5', v); } catch(e) {} }

// ===== 効果音（Web Audio API）=====
let ac = null;
function ensureAudio() {
  if (!ac) try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  if (ac && ac.state === 'suspended') ac.resume().catch(() => {});
}
function playTone(freq, type, dur, vol, f2) {
  if (!ac) return;
  try {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, ac.currentTime);
    if (f2) o.frequency.exponentialRampToValueAtTime(f2, ac.currentTime + dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur + 0.01);
  } catch(e) {}
}
function sfxJump() { playTone(360, 'square',   0.12, 0.09, 580); }
function sfxCoin() { playTone(880, 'sine',     0.18, 0.13, 1320); }
function sfxLand() { playTone(160, 'square',   0.07, 0.06); }
function sfxOver() { playTone(260, 'sawtooth', 0.65, 0.17, 80); }
function sfxBest() {
  playTone(660,  'sine', 0.10, 0.14);
  setTimeout(() => playTone(880,  'sine', 0.10, 0.14), 130);
  setTimeout(() => playTone(1100, 'sine', 0.22, 0.18), 260);
}

// ===== 状態 =====
let state    = 'title';  // title / playing / over
let coins    = 0, score = 0, best = loadBest();
let chase    = 0, shake  = 0;
let newBest  = false, overAlpha = 0, overMsg = '';
let frame    = 0;

// ===== プレイヤー =====
const player = {
  worldX: 0, y: BASE_Y, vy: 0,
  onGround: true, jumps: 0, wheelAngle: 0, tilt: 0,
  falling: false, w: 32, h: 28,
};
const PLAYER_DRAW  = 54;
const PLAYER_SCALE = 0.6;
let holding = false;

// ===== 地形 / コイン / ランドマーク / 雲 =====
let terrain  = [], genX = 0, lastWasGap = false;
let coinsArr = [];
let landmarks = [], landGenX = 0;
let clouds   = [];

function camX() { return player.worldX - PLAYER_X; }

// ===== リセット =====
function reset() {
  coins = 0; score = 0; chase = 0; shake = 0;
  newBest = false; overAlpha = 0; overMsg = ''; frame = 0;
  terrain = []; coinsArr = []; landmarks = [];
  genX = 0; landGenX = 0; lastWasGap = false;
  player.worldX = 0; player.y = BASE_Y; player.vy = 0;
  player.onGround = true; player.jumps = 0; player.tilt = 0; player.falling = false;
  pushFlat(380);
  while (genX     < W + 400) generateSegment();
  while (landGenX < W + 400) generateLandmark();
  clouds = [];
  for (let i = 0; i < 6; i++)
    clouds.push({ x: i * 178 % (W + 180), y: 26 + i * 53 % 100, s: 0.55 + (i % 3) * 0.26 });
}

// ===== 地形生成 =====
function pushPoint(x, y, gap) { terrain.push({ x, y, gap: !!gap }); }

function pushFlat(len) {
  const n = Math.max(2, Math.round(len / STEP));
  for (let i = 0; i <= n; i++) pushPoint(genX + i * STEP, BASE_Y, false);
  genX += len; lastWasGap = false;
}
function pushHill(amp, len) {
  const n = Math.max(4, Math.round(len / STEP));
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    pushPoint(genX + i * STEP, BASE_Y - amp * Math.sin(Math.PI * t), false);
  }
  genX += len; lastWasGap = false;
}
function pushRolling(len) {
  const n     = Math.max(8, Math.round(len / STEP));
  const waves = 2 + Math.floor(Math.random() * 2);
  const amp   = 26 + Math.random() * 26;
  for (let i = 0; i <= n; i++) {
    const t    = i / n;
    const env  = Math.sin(Math.PI * t);
    const wave = 0.5 - 0.5 * Math.cos(2 * Math.PI * waves * t);
    pushPoint(genX + i * STEP, BASE_Y - amp * env * wave, false);
  }
  genX += len; lastWasGap = false;
}
function pushGap(len) {
  const n = Math.max(3, Math.round(len / STEP));
  for (let i = 0; i <= n; i++) pushPoint(genX + i * STEP, BASE_Y, i > 0 && i < n);
  genX += len; lastWasGap = true;
}

function generateSegment() {
  const r = Math.random();
  if (!lastWasGap && r < 0.22) {
    pushGap(85 + Math.random() * 55);
    placeCoinArc(genX - 55, 140);
  } else if (r < 0.50) {
    const amp = 42 + Math.random() * 55;
    pushHill(amp, 220 + Math.random() * 150);
    placeCoinArc(genX - 140, 110);
  } else if (r < 0.78) {
    pushRolling(180 + Math.random() * 160);
  } else {
    pushFlat(110 + Math.random() * 120);
    if (Math.random() < 0.5) placeCoinLine(genX - 100);
  }
}

// ===== コイン配置 =====
function coinBaseY(x) { const g = groundYAt(x); return g === null ? BASE_Y : g; }

function placeCoinArc(cx, span) {
  const n = 5;
  for (let i = 0; i < n; i++) {
    const t = i / (n - 1);
    const x = cx + (t - 0.5) * span;
    coinsArr.push({ x, y: coinBaseY(x) - (48 + Math.sin(Math.PI * t) * 46), r: 12, got: false });
  }
}
function placeCoinLine(sx) {
  const n    = 3 + Math.floor(Math.random() * 3);
  const lift = 54 + Math.random() * 36;
  for (let i = 0; i < n; i++)
    coinsArr.push({ x: sx + i * 34, y: coinBaseY(sx + i * 34) - lift, r: 12, got: false });
}

// ===== ランドマーク =====
const SIGNS = ['餃子', 'もつ焼', '居酒屋', 'ラーメン', '酒場', 'せんべろ', '焼鳥', '煮込み', '中華'];
function generateLandmark() {
  const r = Math.random();
  let m;
  if      (r < 0.11) m = { x: landGenX, kind: 'station', w: 180, h: 120, layer: 1 };
  else if (r < 0.20) m = { x: landGenX, kind: 'arch',    w: 150, h: 78,  layer: 1 };
  else if (r < 0.29) m = { x: landGenX, kind: 'bridge',  w: 210, h: 54,  layer: 1 };
  else if (r < 0.39) m = { x: landGenX, kind: 'post',    w: 56,  h: 116, layer: 0 };
  else if (r < 0.57) m = { x: landGenX, kind: 'sign',    w: 60,  h: 130 + Math.random() * 60,
                            label: SIGNS[Math.floor(Math.random() * SIGNS.length)], layer: 0 };
  else if (r < 0.72) m = { x: landGenX, kind: 'lantern', w: 70,  h: 96 + Math.random() * 40, layer: 0 };
  else               m = { x: landGenX, kind: 'building', w: 60 + Math.random() * 70,
                            h: 80 + Math.random() * 130, layer: Math.random() < 0.5 ? 0 : 1 };
  landmarks.push(m);
  landGenX += m.w + 24 + Math.random() * 30;
}

// ===== 地形クエリ =====
function groundYAt(wx) {
  for (let i = 1; i < terrain.length; i++) {
    if (terrain[i].x >= wx) {
      const a = terrain[i-1], b = terrain[i];
      if (a.gap || b.gap) return null;
      const t = (wx - a.x) / (b.x - a.x);
      return a.y + (b.y - a.y) * t;
    }
  }
  return terrain.length ? terrain[terrain.length - 1].y : BASE_Y;
}

// ===== 入力 =====
function doJump() {
  if (state !== 'playing') return;
  if (player.jumps < MAX_JUMPS) {
    player.vy = JUMP_POWER; player.onGround = false; player.jumps++;
    sfxJump();
  }
}
function press() {
  ensureAudio();
  if (state === 'title' || state === 'over') { startGame(); return; }
  holding = true; doJump();
}
function release() { holding = false; }

canvas.addEventListener('mousedown',  e => { e.preventDefault(); press(); });
canvas.addEventListener('mouseup',    release);
canvas.addEventListener('touchstart', e => { e.preventDefault(); press(); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); release(); }, { passive: false });
window.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); press(); } });
window.addEventListener('keyup',   e => { if (e.code === 'Space' || e.code === 'ArrowUp') release(); });

function startGame() { reset(); state = 'playing'; }

function gameOver(msg) {
  state = 'over'; overMsg = msg;
  score = coins * 30 + Math.floor(player.worldX / 10);
  if (score > best) { best = score; saveBest(best); newBest = true; sfxBest(); }
  else sfxOver();
}

// ===== 速度 =====
function curSpeed() { return 5.5 + Math.min(player.worldX / 6000, 6.5); }

// ===== 更新 =====
function update() {
  frame++;
  if (state === 'title') return;
  if (state === 'over')  { overAlpha = Math.min(1, overAlpha + 0.04); return; }

  const speed = curSpeed();
  if (shake > 0) shake--;

  chase -= 0.11;
  if (chase < 0) chase = 0;
  if (chase >= 100) { gameOver('終電に追いつかれた…🚃'); return; }

  player.worldX += speed;
  player.vy += GRAVITY;
  if (!holding && player.vy < -4) player.vy = -4; // 長押しで高く
  player.y += player.vy;
  player.wheelAngle += speed * 0.14;

  const cx = player.worldX + player.w / 2;
  const gy = groundYAt(cx);
  const wasOnGround = player.onGround;

  if (player.onGround) {
    if (gy === null) { player.onGround = false; player.falling = true; }
    else { player.y = gy; player.vy = 0; player.jumps = 0; }
  }
  if (!player.onGround) {
    if (!player.falling && gy !== null && player.vy >= 0 && player.y >= gy) {
      // ジャンプからの着地（谷への落下中は着地させない）
      player.y = gy; player.vy = 0; player.onGround = true; player.jumps = 0; player.falling = false;
      if (!wasOnGround) sfxLand();
    } else if (player.y > H + 90) {
      gameOver('江戸川に落ちた！🌊'); return;
    }
  }

  // 傾き
  if (player.onGround) {
    const a = groundYAt(cx - 14), b = groundYAt(cx + 14);
    if (a !== null && b !== null) player.tilt = Math.atan2(b - a, 28);
  } else {
    player.tilt += (Math.max(-0.5, Math.min(0.5, player.vy * 0.03)) - player.tilt) * 0.1;
  }

  // 追加生成 & 掃除
  while (genX     < camX() + W + 400) generateSegment();
  while (landGenX < camX() + W + 400) generateLandmark();
  while (terrain.length > 2 && terrain[1].x < camX() - 40) terrain.shift();
  landmarks = landmarks.filter(m => m.x + m.w > camX() - 60);
  coinsArr  = coinsArr.filter(c => c.x > camX() - 60 && !c.got);

  // 雲
  for (const c of clouds) {
    c.x -= speed * 0.1 * c.s;
    if (c.x < -90) { c.x = W + 60; c.y = 26 + Math.random() * 100; }
  }

  // コイン取得
  const pcx = player.worldX + player.w / 2, pcy = player.y - player.h / 2;
  for (const c of coinsArr) {
    if (c.got) continue;
    const dx = pcx - c.x, dy = pcy - c.y;
    if (dx*dx + dy*dy < (c.r + 18) * (c.r + 18)) {
      c.got = true; coins++;
      chase = Math.max(0, chase - 5);
      sfxCoin();
    }
  }
}

// ===== 描画 =====
function draw() {
  ctx.save();
  if (shake > 0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

  // 背景（白）
  ctx.fillStyle = '#fff';
  ctx.fillRect(-20, -20, W + 40, H + 40);

  // 雲
  ctx.strokeStyle = '#d5d5d5'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  for (const c of clouds) drawCloud(c.x, c.y, c.s);

  // 遠景ランドマーク（パララックス）
  for (const m of landmarks) if (m.layer === 1) drawLandmark(m, 0.5, '#dcdcdc');
  for (const m of landmarks) if (m.layer === 0) drawLandmark(m, 0.7, '#bcbcbc');

  // 地形
  drawTerrain();

  // コイン
  for (const c of coinsArr) drawCoin(c.x - camX(), c.y, c.r);

  // プレイヤー
  drawPlayer();

  // 終電
  drawTrain(trainScreenX());

  ctx.restore();

  // HUD
  drawHUD();

  // 画面オーバーレイ
  if (state === 'title') drawTitle();
  if (state === 'over')  drawOver();
}

// ===== 終電位置 =====
function trainScreenX() {
  return -380 + (chase / 100) * (PLAYER_X - 200 + 40 + 380);
}

// ===== 雲 =====
function drawCloud(x, y, s) {
  ctx.beginPath();
  ctx.arc(x,       y,       14*s, Math.PI*0.5, Math.PI*1.5);
  ctx.arc(x+18*s,  y-8*s,  16*s, Math.PI*0.9, Math.PI*2.1);
  ctx.arc(x+40*s,  y,       13*s, Math.PI*1.5, Math.PI*0.5);
  ctx.stroke();
}

// ===== ランドマーク =====
function drawLandmark(m, parallax, col) {
  const x = m.x - camX() * parallax;
  if (x + m.w < -120 || x > W + 120) return;
  const base = BASE_Y - 4;
  ctx.fillStyle = col; ctx.strokeStyle = col; ctx.lineWidth = 2;

  if (m.kind === 'station') {
    const top = base - m.h;
    ctx.fillRect(x, top, m.w, m.h);
    ctx.fillStyle = '#fff'; ctx.fillRect(x+18, top+8, m.w-36, 20);
    ctx.fillStyle = '#666'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('JR 小岩駅', x + m.w/2, top + 22);
    return;
  }
  if (m.kind === 'arch') {
    const top = base - m.h;
    ctx.lineWidth = 7;
    ctx.beginPath();
    ctx.moveTo(x, base); ctx.lineTo(x, top+20);
    ctx.arc(x + m.w/2, top+20, m.w/2, Math.PI, 0);
    ctx.lineTo(x + m.w, base); ctx.stroke();
    ctx.fillStyle = col; ctx.fillRect(x-4, top, m.w+8, 16);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('小岩フラワーロード', x + m.w/2, top + 12);
    return;
  }
  if (m.kind === 'sign') {
    const top = base - m.h;
    ctx.fillRect(x + m.w/2 - 14, top, 28, m.h);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center';
    const t = m.label || '酒場';
    for (let i = 0; i < t.length; i++) ctx.fillText(t[i], x + m.w/2, top + 22 + i*20);
    return;
  }
  if (m.kind === 'lantern') {
    const top = base - m.h;
    ctx.fillRect(x + m.w*0.35, top, m.w*0.18, m.h);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(x+18, base-18, 9, 13, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+m.w-18, base-12, 9, 13, 0, 0, Math.PI*2); ctx.fill();
    return;
  }
  if (m.kind === 'bridge') {
    const topY = base - m.h - 40, botY = base - 40;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(x, botY); ctx.lineTo(x+22, topY);
    ctx.lineTo(x+m.w-22, topY); ctx.lineTo(x+m.w, botY);
    ctx.moveTo(x, botY); ctx.lineTo(x+m.w, botY); ctx.stroke();
    ctx.lineWidth = 1.5;
    for (let bx = x+22; bx < x+m.w-22; bx += 26) {
      ctx.beginPath(); ctx.moveTo(bx, topY); ctx.lineTo(bx+13, botY);
      ctx.moveTo(bx+13, topY); ctx.lineTo(bx, botY); ctx.stroke();
    }
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(x+m.w*0.5, botY); ctx.lineTo(x+m.w*0.5, base); ctx.stroke();
    ctx.fillStyle = col; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('総武線鉄橋', x + m.w/2, topY - 5);
    return;
  }
  if (m.kind === 'post') {
    const top = base - m.h;
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(x+m.w/2, base); ctx.lineTo(x+m.w/2, top+22); ctx.stroke();
    ctx.fillStyle = col; ctx.fillRect(x, top, m.w, 24);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('小岩', x + m.w/2, top + 17);
    return;
  }
  // building
  const top = base - m.h;
  ctx.fillRect(x, top, m.w, m.h);
  ctx.fillStyle = '#fff';
  for (let wy = top+12; wy < base-12; wy += 20)
    for (let wx = x+8; wx < x+m.w-10; wx += 16) ctx.fillRect(wx, wy, 8, 10);
}

// ===== 地形 =====
function drawTerrain() {
  ctx.lineJoin = 'round'; ctx.lineCap = 'round';
  let i = 0;
  const n = terrain.length;
  while (i < n) {
    if (terrain[i].gap) {
      const x0 = terrain[i].x - camX();
      while (i < n && terrain[i].gap) i++;
      const x1 = (i < n ? terrain[i].x : terrain[n-1].x) - camX();
      drawValley(x0, x1);
      continue;
    }
    const s = i;
    while (i < n && !terrain[i].gap) i++;
    const e = i - 1;

    // 地面ポリゴン
    ctx.beginPath();
    ctx.moveTo(terrain[s].x - camX(), terrain[s].y);
    for (let k = s+1; k <= e; k++) ctx.lineTo(terrain[k].x - camX(), terrain[k].y);
    ctx.lineTo(terrain[e].x - camX(), H + 20);
    ctx.lineTo(terrain[s].x - camX(), H + 20);
    ctx.closePath();
    ctx.fillStyle = '#222'; ctx.fill();

    // 上辺の線
    ctx.beginPath();
    ctx.moveTo(terrain[s].x - camX(), terrain[s].y);
    for (let k = s+1; k <= e; k++) ctx.lineTo(terrain[k].x - camX(), terrain[k].y);
    ctx.strokeStyle = '#111'; ctx.lineWidth = 4; ctx.stroke();

    // 白い破線（センターライン）
    ctx.save();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
    ctx.setLineDash([18, 16]);
    ctx.lineDashOffset = -(camX() % 34);
    ctx.beginPath();
    ctx.moveTo(terrain[s].x - camX(), terrain[s].y - 5);
    for (let k = s+1; k <= e; k++) ctx.lineTo(terrain[k].x - camX(), terrain[k].y - 5);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
}

// ===== 谷（江戸川）=====
function drawValley(x0, x1) {
  ctx.strokeStyle = '#c8c8c8'; ctx.lineWidth = 1.8;
  const L = Math.max(x0, -12), R = Math.min(x1, W + 12);
  for (let wy = BASE_Y + 34; wy < H; wy += 22) {
    ctx.beginPath();
    for (let wx = L; wx <= R; wx += 6) {
      const yy = wy + Math.sin((wx + camX()) * 0.11 + wy * 0.07) * 3;
      wx === L ? ctx.moveTo(wx, yy) : ctx.lineTo(wx, yy);
    }
    ctx.stroke();
  }
  if (x1 - x0 > 60) {
    ctx.fillStyle = '#aaa'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('江戸川', (x0 + x1) / 2, BASE_Y + 24);
  }
}

// ===== コイン =====
function drawCoin(sx, sy, r) {
  ctx.save();
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(sx, sy, r * 0.62, 0, Math.PI*2);
  ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#111';
  ctx.font = `bold ${Math.round(r * 1.05)}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('¥', sx, sy + 0.5);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ===== プレイヤー =====
function drawPlayer() {
  const BW = PLAYER_DRAW;
  ctx.save();
  ctx.translate(PLAYER_X + player.w/2, player.y);
  ctx.rotate(player.tilt);
  ctx.scale(PLAYER_SCALE, PLAYER_SCALE);
  ctx.translate(-(BW/2), 0);

  // 接地影
  if (player.onGround) {
    ctx.fillStyle = 'rgba(0,0,0,0.11)';
    ctx.beginPath(); ctx.ellipse(BW/2, 4, 24, 5, 0, 0, Math.PI*2); ctx.fill();
  }

  ctx.strokeStyle = '#111'; ctx.fillStyle = '#111';
  ctx.lineWidth = 3.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  const wr = 14, bx = 8, fx = BW - 6, wy = -wr;
  drawWheel(bx, wy, wr);
  drawWheel(fx, wy, wr);

  // フレーム
  const mx = BW/2 - 4, st = wy - 16;
  ctx.beginPath();
  ctx.moveTo(bx, wy); ctx.lineTo(mx, st); ctx.lineTo(fx, wy);
  ctx.moveTo(mx, st); ctx.lineTo(mx+8, wy); ctx.stroke();
  // ハンドル
  ctx.beginPath();
  ctx.moveTo(fx, wy); ctx.lineTo(fx-2, wy-18); ctx.lineTo(fx-11, wy-18); ctx.stroke();
  // 体
  const bod = mx, bt = st - 18;
  ctx.beginPath(); ctx.moveTo(bod, st);   ctx.lineTo(bod+2, bt);      ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bod+2, bt+2); ctx.lineTo(fx-9, wy-18); ctx.stroke();
  // 頭（白フード＋黒縁）
  ctx.beginPath(); ctx.arc(bod+3, bt-10, 11, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = '#111'; ctx.stroke();
  ctx.beginPath(); ctx.arc(bod+3, bt-10, 11, Math.PI*1.85, Math.PI*0.15); ctx.stroke();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(bod+8, bt-11, 1.6, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}
function drawWheel(cx, cy, r) {
  ctx.strokeStyle = '#111'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 4; i++) {
    const a = player.wheelAngle + i * (Math.PI/2);
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a)*r*0.85, cy + Math.sin(a)*r*0.85); ctx.stroke();
  }
}

// ===== 終電 =====
function drawTrain(tx) {
  const tw = 200, top = BASE_Y - 110, h = 110;
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#111'; ctx.lineWidth = 3.5;
  roundRect(tx, top, tw, h, 14); ctx.fill(); ctx.stroke();
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(tx, top+20); ctx.lineTo(tx+tw, top+20); ctx.stroke();
  ctx.fillStyle = '#111'; roundRect(tx+tw-60, top+30, 46, 38, 6); ctx.fill();
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2.5;
  for (let wx = tx+14; wx < tx+tw-74; wx += 38) { roundRect(wx, top+34, 26, 30, 4); ctx.stroke(); }
  ctx.fillStyle = '#111'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('終電', tx+tw-37, top+16);
  ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('総武線', tx+14, top+88);
  ctx.lineWidth = 2; ctx.strokeStyle = '#111';
  ctx.beginPath(); ctx.arc(tx+tw-10, top+h-16, 6, 0, Math.PI*2); ctx.stroke();
  // スピード線
  ctx.strokeStyle = '#bbb'; ctx.lineWidth = 1.8;
  for (let i = 0; i < 4; i++) {
    const ly = top + 18 + i * 22;
    ctx.beginPath(); ctx.moveTo(tx-26-i*9, ly); ctx.lineTo(tx-6, ly); ctx.stroke();
  }
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,  x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x,   y+h, x,  y,   r); ctx.arcTo(x,   y,   x+w, y, r);
  ctx.closePath();
}

// ===== HUD =====
function drawHUD() {
  if (state !== 'playing') return;

  // 左パネル：メダル数 & 距離
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
  roundRect(12, 12, 220, 62, 8); ctx.fill(); ctx.stroke();

  drawCoin(33, 33, 11);
  ctx.fillStyle = '#111'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('× ' + coins, 50, 41);
  ctx.fillStyle = '#888'; ctx.font = '13px sans-serif';
  ctx.fillText('距離  ' + Math.floor(player.worldX / 10) + ' m　ベスト ' + best, 18, 63);

  // 右パネル：追手ゲージ
  const bx = W - 268, by = 14, bw = 246, bh = 22;
  ctx.fillStyle = '#888'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('🚃 終電との距離', bx, by - 5);

  ctx.fillStyle = '#e8e8e8';
  roundRect(bx, by, bw, bh, 4); ctx.fill();

  const ratio = chase / 100;
  if (ratio > 0) {
    ctx.save();
    ctx.beginPath(); roundRect(bx, by, bw * ratio, bh, 4); ctx.clip();
    ctx.fillStyle = ratio >= 0.8 ? '#111' : ratio >= 0.5 ? '#555' : '#999';
    ctx.fillRect(bx, by, bw, bh);
    ctx.restore();
  }
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
  roundRect(bx, by, bw, bh, 4); ctx.stroke();

  // 危険点滅
  if (ratio >= 0.78 && frame % 28 < 14) {
    ctx.fillStyle = ratio >= 0.9 ? '#fff' : '#ddd';
    ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('あぶない！', bx + bw/2, by + 16);
  }
}

// ===== タイトル画面 =====
function drawTitle() {
  ctx.fillStyle = 'rgba(255,255,255,0.93)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#111';
  ctx.font = 'bold 52px "Hiragino Maru Gothic ProN", "Meiryo", sans-serif';
  ctx.fillText('小岩チャリ走', W/2, H/2 - 100);

  ctx.fillStyle = '#777'; ctx.font = '18px sans-serif';
  ctx.fillText('〜 終電からにげきれ！ 〜', W/2, H/2 - 66);

  // ルール（シンプルに3行）
  ctx.fillStyle = '#444'; ctx.font = '15px sans-serif';
  ctx.fillText('タップ / クリック / スペース でジャンプ（連打で多段）', W/2, H/2 - 14);
  ctx.fillText('谷（江戸川）に落ちたらゲームオーバー', W/2, H/2 + 14);
  ctx.fillText('背後の終電に追いつかれないように！', W/2, H/2 + 42);

  // スタートボタン（呼吸するパルス）
  const pulse = 1 + Math.sin(frame * 0.06) * 0.03;
  ctx.save();
  ctx.translate(W/2, H/2 + 108);
  ctx.scale(pulse, pulse);
  ctx.fillStyle = '#111';
  roundRect(-110, -28, 220, 56, 28); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('スタート', 0, 10);
  ctx.restore();

  if (best > 0) {
    ctx.fillStyle = '#bbb'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('ベスト：' + best, W/2, H/2 + 155);
  }
}

// ===== ゲームオーバー画面 =====
function drawOver() {
  ctx.save();
  ctx.globalAlpha = overAlpha;

  ctx.fillStyle = 'rgba(255,255,255,0.94)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#111'; ctx.font = 'bold 34px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(overMsg, W/2, H/2 - 102);

  // スコアパネル
  ctx.fillStyle = '#f7f7f7'; ctx.strokeStyle = '#ccc'; ctx.lineWidth = 2;
  roundRect(W/2 - 180, H/2 - 84, 360, 120, 10); ctx.fill(); ctx.stroke();

  ctx.fillStyle = '#999'; ctx.font = '13px sans-serif';
  ctx.fillText('スコア', W/2, H/2 - 60);
  ctx.fillStyle = '#111'; ctx.font = 'bold 48px sans-serif';
  ctx.fillText(score, W/2, H/2 - 14);
  ctx.fillStyle = '#666'; ctx.font = '15px sans-serif';
  ctx.fillText('メダル ' + coins + ' 枚　／　距離 ' + Math.floor(player.worldX/10) + ' m', W/2, H/2 + 22);

  if (newBest) {
    ctx.fillStyle = '#111'; ctx.font = 'bold 18px sans-serif';
    ctx.fillText('🎉 NEW RECORD', W/2, H/2 + 50);
  } else {
    ctx.fillStyle = '#aaa'; ctx.font = '13px sans-serif';
    ctx.fillText('ベスト ' + best, W/2, H/2 + 50);
  }

  // リトライボタン
  const pulse = 1 + Math.sin(frame * 0.06) * 0.03;
  ctx.save();
  ctx.translate(W/2, H/2 + 112);
  ctx.scale(pulse, pulse);
  ctx.fillStyle = '#111';
  roundRect(-110, -28, 220, 56, 28); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('もう一回', 0, 10);
  ctx.restore();

  ctx.restore();
}

// ===== ループ =====
function loop() { update(); draw(); requestAnimationFrame(loop); }
reset(); state = 'title'; loop();
</script>
